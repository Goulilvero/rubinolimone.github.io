<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <title>Compilation di RUBINO che LIMONA </title>

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html { height:100%; background:#000; overflow:hidden; }
    .video-container {
      position:fixed; top:0; left:0; width:100%; height:100%; z-index:1;
    }
    iframe {
      width:100%; height:100%; border:none;
    }
    .start-overlay {
      position:fixed; inset:0; z-index:10;
      background:rgba(0,0,0,0.4);
      display:flex; align-items:center; justify-content:center;
      color:white; font-size:2rem; font-family:Arial,sans-serif;
      cursor:pointer; transition:opacity 0.6s;
    }
    .start-overlay.hidden { opacity:0; pointer-events:none; }
  </style>
</head>
<body>

<div class="video-container">
  <iframe 
    id="ytVideo"
    src="https://www.youtube-nocookie.com/embed/5KCa-M0Yqw4?autoplay=1&controls=0&modestbranding=1&showinfo=0&rel=0&iv_load_policy=3&fs=1&playsinline=0&enablejsapi=1"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
    allowfullscreen
    referrerpolicy="strict-origin-when-cross-origin">
  </iframe>
</div>

<div class="start-overlay" id="startOverlay">
  AURA RUBINO DIO NEGRO
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const overlay = document.getElementById('startOverlay');
  const container = document.querySelector('.video-container');

  const hideOverlay = () => {
    overlay.classList.add('hidden');
  };

  const tryFullscreen = () => {
    if (!document.fullscreenElement) {
      if (container.requestFullscreen) container.requestFullscreen().catch(() => {});
      else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
      else if (container.msRequestFullscreen) container.msRequestFullscreen();
    }
  };

  const startEverything = () => {
    hideOverlay();
    tryFullscreen();

   
    document.body.removeEventListener('click', startEverything);
    document.body.removeEventListener('touchstart', startEverything);
  };

  
  document.body.addEventListener('click', startEverything);
  document.body.addEventListener('touchstart', startEverything);
});
</script>

</body>
</html>
